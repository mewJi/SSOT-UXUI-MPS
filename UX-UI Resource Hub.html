  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

noopener\" style=\"display:flex;align-items:center;gap:13px;padding:12px 14px;background:#fff;border:1px solid #ECEAE4;border-radius:13px;text-decoration:none;\">\n                  <div style=\"flex:none;width:38px;height:38px;border-radius:10px;background:{{ item.monoBg }};color:{{ item.monoFg }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;\">{{ item.mono }}<\u002Fdiv>\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"font-size:13.5px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ item.title }}<\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#A39DA8;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ item.subline }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ manage }}\" hint-placeholder-val=\"{{ false }}\">\n                    <button onclick=\"{{ item.onEdit }}\" style=\"flex:none;width:30px;height:30px;border-radius:8px;border:1px solid #ECEAE4;background:#fff;cursor:pointer;font-size:12px;\">✎<\u002Fbutton>\n                    <button onclick=\"{{ item.onDelete }}\" style=\"flex:none;width:30px;height:30px;border-radius:8px;border:1px solid #F3DEDE;background:#fff;color:#C97A7A;cursor:pointer;font-size:12px;\">🗑<\u002Fbutton>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ notManage }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:none;font-size:14px;color:#C7C2CB;\">↗<\u002Fspan><\u002Fsc-if>\n                <\u002Fa>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <sc-if value=\"{{ manage }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n            <button onclick=\"{{ openAddTopic }}\" style=\"flex:1;min-width:200px;padding:15px;border:1.5px dashed #D8D4CD;background:#fff;border-radius:14px;color:#8A8590;font-size:14px;font-weight:600;cursor:pointer;\">＋ เพิ่มหัวข้อ / หมวดหมู่<\u002Fbutton>\n            <button onclick=\"{{ openAddGroup }}\" style=\"flex:1;min-width:200px;padding:15px;border:1.5px dashed #D8D4CD;background:#fff;border-radius:14px;color:#8A8590;font-size:14px;font-weight:600;cursor:pointer;\">＋ เพิ่มกลุ่มใหม่<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- MODAL: link -->\n  <sc-if value=\"{{ modalLink }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(46,42,51,0.34);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:440px;background:#fff;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.18);\">\n        <div style=\"font-size:17px;font-weight:700;margin-bottom:18px;\">{{ formHeading }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <div>\n            <div style=\"font-size:12px;font-weight:600;color:#8A8590;margin-bottom:5px;\">ชื่อเอกสาร / รายการ<\u002Fdiv>\n            <input value=\"{{ form.title }}\" oninput=\"{{ setTitle }}\" placeholder=\"เช่น 2026 KPI Goal Setting\" style=\"width:100%;padding:11px 13px;border:1.5px solid #EBE8E2;border-radius:11px;font-size:14px;outline:none;\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px;font-weight:600;color:#8A8590;margin-bottom:5px;\">ลิงก์ (URL)<\u002Fdiv>\n            <input value=\"{{ form.url }}\" oninput=\"{{ setUrl }}\" placeholder=\"https://…\" style=\"width:100%;padding:11px 13px;border:1.5px solid #EBE8E2;border-radius:11px;font-size:14px;outline:none;\">\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:11px;\">\n            <div style=\"flex:1;\">\n              <div style=\"font-size:12px;font-weight:600;color:#8A8590;margin-bottom:5px;\">กลุ่ม<\u002Fdiv>\n              <select value=\"{{ form.group }}\" onchange=\"{{ setGroup }}\" style=\"width:100%;padding:11px 13px;border:1.5px solid #EBE8E2;border-radius:11px;font-size:14px;outline:none;background:#fff;\">\n                <sc-for list=\"{{ groupOptions }}\" as=\"g\" hint-placeholder-count=\"3\"><option value=\"{{ g.name }}\">{{ g.name }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:12px;font-weight:600;color:#8A8590;margin-bottom:5px;\">แพลตฟอร์ม<\u002Fdiv>\n              <input value=\"{{ form.platform }}\" oninput=\"{{ setPlatform }}\" placeholder=\"เช่น Figma\" list=\"platlist\" style=\"width:100%;padding:11px 13px;border:1.5px solid #EBE8E2;border-radius:11px;font-size:14px;outline:none;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px;font-weight:600;color:#8A8590;margin-bottom:5px;\">หมวดหมู่ (หัวข้อเรื่อง)<\u002Fdiv>\n            <input value=\"{{ form.category }}\" oninput=\"{{ setCategory }}\" placeholder=\"เลือกหรือพิมพ์หมวดใหม่\" list=\"catlist\" style=\"width:100%;padding:11px 13px;border:1.5px solid #EBE8E2;border-radius:11px;font-size:14px;outline:none;\">\n            <datalist id=\"catlist\"><sc-for list=\"{{ catNames }}\" as=\"c\" hint-placeholder-count=\"0\"><option value=\"{{ c }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n            <datalist id=\"platlist\"><sc-for list=\"{{ platNames }}\" as=\"p\" hint-placeholder-count=\"0\"><option value=\"{{ p }}\"><\u002Foption><\u002Fsc-for><\u002Fdatalist>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;margin-top:22px;\">\n          <sc-if value=\"{{ canDelete }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ deleteCurrent }}\" style=\"padding:11px 14px;border:1px solid #F3DEDE;background:#fff;color:#C97A7A;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;\">ลบ<\u002Fbutton>\n          <\u002Fsc-if>\n          <span style=\"flex:1;\"><\u002Fspan>\n          <button onclick=\"{{ closeModal }}\" style=\"padding:11px 18px;border:1px solid #EBE8E2;background:#fff;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;\">ยกเลิก<\u002Fbutton>\n          <button onclick=\"{{ saveLink }}\" style=\"{{ saveBtnStyle }}\">บันทึก<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- MODAL: topic -->\n  <sc-if value=\"{{ modalTopic }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(46,42,51,0.34);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:400px;background:#fff;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.18);\">\n        <div style=\"font-size:17px;font-weight:700;margin-bottom:18px;\">เพิ่มหัวข้อใหม่<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <div>\n            <div style=\"font-size:12px;font-weight:600;color:#8A8590;margin-bottom:5px;\">ชื่อหัวข้อ / หมวดหมู่<\u002Fdiv>\n            <input value=\"{{ form.category }}\" oninput=\"{{ setCategory }}\" placeholder=\"เช่น Research Repository\" style=\"width:100%;padding:11px 13px;border:1.5px solid #EBE8E2;border-radius:11px;font-size:14px;outline:none;\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px;font-weight:600;color:#8A8590;margin-bottom:5px;\">อยู่ในกลุ่ม<\u002Fdiv>\n            <select value=\"{{ form.group }}\" onchange=\"{{ setGroup }}\" style=\"width:100%;padding:11px 13px;border:1.5px solid #EBE8E2;border-radius:11px;font-size:14px;outline:none;background:#fff;\">\n              <sc-for list=\"{{ groupOptions }}\" as=\"g\" hint-placeholder-count=\"3\"><option value=\"{{ g.name }}\">{{ g.name }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;margin-top:22px;\">\n          <span style=\"flex:1;\"><\u002Fspan>\n          <button onclick=\"{{ closeModal }}\" style=\"padding:11px 18px;border:1px solid #EBE8E2;background:#fff;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;\">ยกเลิก<\u002Fbutton>\n          <button onclick=\"{{ saveTopic }}\" style=\"{{ saveTopicBtnStyle }}\">เพิ่มหัวข้อ<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- MODAL: group -->\n  <sc-if value=\"{{ modalGroup }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(46,42,51,0.34);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;\">\n      <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:400px;background:#fff;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.18);\">\n        <div style=\"font-size:17px;font-weight:700;margin-bottom:6px;\">เพิ่มกลุ่มใหม่<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9A949F;margin-bottom:18px;\">กลุ่มใช้จัดกลุ่มของหัวข้อ และจะได้สีพาสเทลอัตโนมัติ<\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;font-weight:600;color:#8A8590;margin-bottom:5px;\">ชื่อกลุ่ม<\u002Fdiv>\n          <input value=\"{{ form.name }}\" oninput=\"{{ setName }}\" placeholder=\"เช่น Research, Brand, Ops\" style=\"width:100%;padding:11px 13px;border:1.5px solid #EBE8E2;border-radius:11px;font-size:14px;outline:none;\">\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;margin-top:22px;\">\n          <span style=\"flex:1;\"><\u002Fspan>\n          <button onclick=\"{{ closeModal }}\" style=\"padding:11px 18px;border:1px solid #EBE8E2;background:#fff;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;\">ยกเลิก<\u002Fbutton>\n          <button onclick=\"{{ saveGroup }}\" style=\"{{ saveGroupBtnStyle }}\">เพิ่มกลุ่ม<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1060,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  state = { items: [], extraCats: [], groups: [], query: '', group: 'all', manage: false, modal: null, form: null, loaded: false };\n\n  DEFAULT_GROUPS = [\n    { name: 'UX/UI', soft: '#EFEAFB', accent: '#7C6BD0' },\n    { name: 'Design Management', soft: '#E1F1E8', accent: '#3F9E72' },\n    { name: 'Backoffice', soft: '#FBE8DA', accent: '#CC7E4A' }\n  ];\n  PALETTE = [\n    ['#EFEAFB','#7C6BD0'],['#E1F1E8','#3F9E72'],['#FBE8DA','#CC7E4A'],\n    ['#E5EFFB','#5B8CC9'],['#FBE5EE','#C96D97'],['#FBF4DA','#B79A3F'],\n    ['#E3F3F4','#4A9CA3'],['#EDE9E3','#8A8276'],['#E9F0DD','#7A9A4E']\n  ];\n\n  componentDidMount() { this.load(); }\n\n  load() {\n    const seed = window.HUB_SEED;\n    if (!seed) { setTimeout(() => this.load(), 60); return; }\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('uxui_hub_v1') || 'null'); } catch (e) {}\n    const groups = (saved && Array.isArray(saved.groups) && saved.groups.length) ? saved.groups : this.DEFAULT_GROUPS.map(g => ({ ...g }));\n    if (saved && Array.isArray(saved.items)) {\n      this.setState({ items: saved.items, extraCats: saved.extraCats || [], groups, loaded: true });\n    } else {\n      this.setState({ items: seed.map(x => ({ ...x })), extraCats: [], groups, loaded: true });\n    }\n  }\n\n  persist(items, extraCats, groups) {\n    groups = groups || this.state.groups;\n    try { localStorage.setItem('uxui_hub_v1', JSON.stringify({ items, extraCats, groups })); } catch (e) {}\n  }\n\n  gm(group) { return (this.state.groups || []).find(g => g.name === group) || { soft: '#F1EFEA', accent: '#8A8590' }; }\n\n  decorate(it) {\n    const m = this.gm(it.group);\n    let host = '';\n    try { host = new URL(it.url).hostname.replace(/^www\\./, ''); } catch (e) { host = ''; }\n    const base = (it.platform || it.title || '?').trim();\n    const mono = base.replace(/[^A-Za-z0-9ก-๙]/g, '').slice(0, 2).toUpperCase() || '•';\n    const sub = [it.platform, it.remark].filter(Boolean).join(' · ') || host;\n    return { ...it, host, mono, monoBg: m.soft, monoFg: m.accent, subline: sub,\n      onEdit: (e) => { if (e) { e.preventDefault(); e.stopPropagation(); } this.openEdit(it); },\n      onDelete: (e) => { if (e) { e.preventDefault(); e.stopPropagation(); } this.del(it.id); } };\n  }\n\n  // ---- mutations ----\n  toggleManage = () => this.setState(s => ({ manage: !s.manage }));\n  setQuery = (e) => this.setState({ query: e.target.value });\n  clearQuery = () => this.setState({ query: '' });\n  setGroupFilter(g) { this.setState({ group: g }); }\n\n  openAdd = () => this.setState({ modal: 'link', form: { id: null, title: '', url: '', platform: '', group: 'UX/UI', category: '' } });\n  openAddIn(group, category) { this.setState({ modal: 'link', form: { id: null, title: '', url: '', platform: '', group, category } }); }\n  openEdit(it) { this.setState({ modal: 'link', form: { ...it } }); }\n  openAddTopic = () => this.setState({ modal: 'topic', form: { category: '', group: (this.state.groups[0] || {}).name || 'UX/UI' } });\n  openAddGroup = () => this.setState({ modal: 'group', form: { name: '' } });\n  saveGroup = () => {\n    const f = this.state.form;\n    if (!f || !f.name.trim()) return;\n    const name = f.name.trim();\n    if (this.state.groups.some(g => g.name === name)) { this.setState({ modal: null, form: null, group: name }); return; }\n    const pair = this.PALETTE[this.state.groups.length % this.PALETTE.length];\n    const groups = [...this.state.groups, { name, soft: pair[0], accent: pair[1] }];\n    this.persist(this.state.items, this.state.extraCats, groups);\n    this.setState({ groups, modal: null, form: null, group: name });\n  };\n  closeModal = () => this.setState({ modal: null, form: null });\n  stop = (e) => { if (e) e.stopPropagation(); };\n\n  setField(field, v) { this.setState(s => ({ form: { ...s.form, [field]: v } })); }\n  setTitle = (e) => this.setField('title', e.target.value);\n  setUrl = (e) => this.setField('url', e.target.value);\n  setPlatform = (e) => this.setField('platform', e.target.value);\n  setCategory = (e) => this.setField('category', e.target.value);\n  setGroup = (e) => this.setField('group', e.target.value);\n  setName = (e) => this.setField('name', e.target.value);\n\n  saveLink = () => {\n    const f = this.state.form;\n    if (!f || !f.title.trim() || !f.url.trim()) return;\n    let url = f.url.trim();\n    if (!/^https?:\\/\\//i.test(url) && !/^mailto:/i.test(url)) url = 'https://' + url;\n    const rec = { title: f.title.trim(), url, platform: (f.platform || '').trim(),\n      remark: (f.remark || '').trim(), group: f.group, category: (f.category || 'Others').trim() };\n    let items;\n    if (f.id) {\n      items = this.state.items.map(it => it.id === f.id ? { ...it, ...rec, id: f.id } : it);\n    } else {\n      const nextId = this.state.items.reduce((m, it) => Math.max(m, it.id || 0), 0) + 1;\n      items = [...this.state.items, { id: nextId, ...rec }];\n    }\n    this.persist(items, this.state.extraCats);\n    this.setState({ items, modal: null, form: null });\n  };\n\n  del(id) {\n    if (!window.confirm('ลบลิงก์นี้ออกจาก Hub?')) return;\n    const items = this.state.items.filter(it => it.id !== id);\n    this.persist(items, this.state.extraCats);\n    this.setState({ items, modal: null, form: null });\n  }\n  deleteCurrent = () => { if (this.state.form && this.state.form.id) this.del(this.state.form.id); };\n\n  saveTopic = () => {\n    const f = this.state.form;\n    if (!f || !f.category.trim()) return;\n    const cat = f.category.trim();\n    const exists = this.state.items.some(it => it.group === f.group && it.category === cat)\n      || this.state.extraCats.some(c => c.group === f.group && c.category === cat);\n    let extraCats = this.state.extraCats;\n    if (!exists) extraCats = [...extraCats, { group: f.group, category: cat }];\n    this.persist(this.state.items, extraCats);\n    this.setState({ extraCats, modal: null, form: null });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const q = (s.query || '').trim().toLowerCase();\n    const isSearching = q.length > 0;\n    const inScope = (g) => s.group === 'all' || s.group === g;\n\n    // build ordered categories\n    const order = [], cmap = {};\n    const ensure = (g, c) => { const k = g + '||' + c; if (!cmap[k]) { cmap[k] = { group: g, category: c, items: [] }; order.push(k); } return cmap[k]; };\n    s.items.forEach(it => ensure(it.group, it.category).items.push(it));\n    s.extraCats.forEach(ec => ensure(ec.group, ec.category));\n\n    // chips\n    const counts = {};\n    (s.groups || []).forEach(g => counts[g.name] = 0);\n    s.items.forEach(it => { if (counts[it.group] != null) counts[it.group]++; });\n    const chipBase = 'display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .12s;';\n    const mkChip = (key, label, count, accent) => {\n      const active = s.group === key;\n      const style = chipBase + (active\n        ? `background:#2E2A33;color:#fff;border-color:#2E2A33;`\n        : `background:#fff;color:#6A6570;border-color:#EBE8E2;`);\n      const dotStyle = `width:8px;height:8px;border-radius:50%;background:${accent};display:inline-block;`;\n      return { label, count, style, dot: !!accent, dotStyle, onClick: () => this.setGroupFilter(key) };\n    };\n    const total = s.items.length;\n    const chips = [mkChip('all', 'ทั้งหมด', total, null)]\n      .concat((s.groups || []).map(g => mkChip(g.name, g.name, counts[g.name] || 0, g.accent)));\n\n    // search results\n    const results = isSearching ? s.items.filter(it => inScope(it.group) && (\n      (it.title || '').toLowerCase().includes(q) ||\n      (it.remark || '').toLowerCase().includes(q) ||\n      (it.platform || '').toLowerCase().includes(q) ||\n      (it.category || '').toLowerCase().includes(q) ||\n      (it.group || '').toLowerCase().includes(q)\n    )).map(it => this.decorate(it)) : [];\n\n    // browse sections\n    const sections = order.map(k => cmap[k]).filter(sec => inScope(sec.group)).map(sec => {\n      const m = this.gm(sec.group);\n      return { key: sec.group + '/' + sec.category, category: sec.category, group: sec.group,\n        accent: m.accent, soft: m.soft, count: sec.items.length,\n        items: sec.items.map(it => this.decorate(it)),\n        onAdd: () => this.openAddIn(sec.group, sec.category) };\n    });\n\n    const catNames = [...new Set(order.map(k => cmap[k].category))];\n    const platNames = [...new Set(s.items.map(it => it.platform).filter(Boolean))];\n    const groupOptions = (s.groups || []).map(g => ({ name: g.name }));\n\n    const f = s.form || {};\n    const saveOn = !!(f.title && f.title.trim() && f.url && f.url.trim());\n    const saveBtnStyle = `padding:11px 20px;border:none;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;color:#fff;background:${saveOn ? '#2E2A33' : '#C9C5CC'};`;\n    const topicOn = !!(f.category && f.category.trim());\n    const saveTopicBtnStyle = `padding:11px 18px;border:none;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;color:#fff;background:${topicOn ? '#2E2A33' : '#C9C5CC'};`;\n    const groupOn = !!(f.name && f.name.trim());\n    const saveGroupBtnStyle = `padding:11px 18px;border:none;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;color:#fff;background:${groupOn ? '#2E2A33' : '#C9C5CC'};`;\n    const manageBtnStyle = `padding:9px 15px;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;border:1.5px solid ${s.manage ? '#2E2A33' : '#EBE8E2'};background:${s.manage ? '#2E2A33' : '#fff'};color:${s.manage ? '#fff' : '#6A6570'};`;\n\n    return {\n      query: s.query, hasQuery: q.length > 0, manage: s.manage, notManage: !s.manage,\n      manageLabel: s.manage ? '✓ กำลังจัดการ' : '⚙ จัดการ', manageBtnStyle,\n      setQuery: this.setQuery, clearQuery: this.clearQuery,\n      toggleManage: this.toggleManage, openAdd: this.openAdd, openAddTopic: this.openAddTopic,\n      openAddGroup: this.openAddGroup, saveGroup: this.saveGroup, setName: this.setName,\n      modalGroup: s.modal === 'group', groupOptions, saveGroupBtnStyle,\n      chips,\n      isSearching, isBrowsing: !isSearching,\n      results, resultCount: results.length, noResults: isSearching && results.length === 0,\n      sections,\n      modalLink: s.modal === 'link', modalTopic: s.modal === 'topic',\n      form: f, formHeading: f.id ? 'แก้ไขลิงก์' : 'เพิ่มลิงก์ใหม่',\n      canDelete: !!f.id, deleteCurrent: this.deleteCurrent,\n      setTitle: this.setTitle, setUrl: this.setUrl, setPlatform: this.setPlatform,\n      setCategory: this.setCategory, setGroup: this.setGroup,\n      saveLink: this.saveLink, saveTopic: this.saveTopic,\n      closeModal: this.closeModal, stop: this.stop,\n      catNames, platNames, saveBtnStyle, saveTopicBtnStyle,\n      canDeleteShown: !!f.id\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
